name: Build and publish container

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve version from the release
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Use the release payload's tag (authoritative; survives re-runs) rather than
          # GITHUB_REF_NAME, which can be a branch on a re-run and yield an empty version.
          version="${TAG#v}"
          if [ -z "$version" ]; then
            echo "::error::Could not resolve a release version from the event tag '${TAG}'"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check out the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag from the resolved version (not github.ref, which isn't reliably the tag here) so
          # the image gets both :<version> (the add-on pins this) and :latest.
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push the multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  bump-addon-version:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Point the Home Assistant add-on at the released image
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^version: .*/version: \"${version}\"/" addon/config.yaml
          git add addon/config.yaml
          if git diff --staged --quiet; then
            echo "Add-on version already current; nothing to commit."
          else
            git commit -m "Bump Home Assistant add-on to ${version}"
            git push origin HEAD:main
          fi

name: Ambilight+Hue Pro Bridge
version: "0.1.0"
slug: ambilight_hue_pro_bridge
description: >-
  Bridge older Philips Ambilight+Hue TVs to a modern Philips Hue (V2/Pro) bridge
  over the low-latency Entertainment API.
url: https://github.com/marcelveldt/ambilight-hue-pro-bridge
# Prebuilt multi-arch image published to GHCR on each release; Home Assistant pulls
# <image>:<version> and Docker selects the matching architecture from the manifest.
image: ghcr.io/marcelveldt/ambilight-hue-pro-bridge
arch:
  - aarch64
  - amd64
# The bridge answers SSDP/mDNS multicast and presents a virtual Hue bridge on the LAN, so it
# must share the host's network namespace.
host_network: true
# Expose the config web UI in the HA sidebar via ingress (HA handles auth). With host_network
# the ingress port is assigned dynamically (0); the service reads it from the Supervisor API.
ingress: true
ingress_port: 0
panel_icon: mdi:television-ambient-light
panel_title: Ambilight Bridge
# The image runs a plain Python process that handles SIGTERM itself; no s6 init wrapper needed.
init: false
boot: auto
startup: application
# User-set options. Home Assistant writes these to /data/options.json, which the service reads
# on startup. http_port stays 80 for the Ambilight TVs; https enables the optional TLS listener.
options:
  log_level: info
  http_port: 80
  https: false
schema:
  log_level: list(verbose|debug|info|warning|error)
  http_port: port
  https: bool
